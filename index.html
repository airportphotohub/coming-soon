<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    img {
      max-width: 50%; /* smaller on desktop */
      width: 500px;   /* sets a fixed max size */
      height: auto;   /* preserves aspect ratio */
      margin-top: 50px;
    }

    h1 {
      margin-top: 20px;
      font-size: 26px;
    }

    /* Responsive for smaller screens */
    @media (max-width: 600px) {
      img {
        max-width: 90%;
        width: 90%;
        height:auto;
      }

      h1 {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <img src="APH_Logo.jpg" alt="Coming Soon">
  <h1>Something awesome is coming soon.</h1>
</body>
</html>
