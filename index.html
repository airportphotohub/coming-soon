<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    img {
      max-width: 55%;  /* slightly smaller desktop */
      width: 450px;    /* 10% smaller than 500px */
      height: auto;
      margin-top: 50px;
    }

    h1 {
      margin-top: 20px;
      font-size: 18px; /* 25% smaller than 24px */
    }

    /* Mobile */
    @media (max-width: 900px) {
      img {
        width: calc(100% - 20px); /* full width minus padding */
        max-width: none;          /* remove desktop constraint */
        height: auto;
        margin: 50px 10px 0;      /* 10px padding on each side */
      }

      h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <img src="APH_Logo.jpg" alt="Coming Soon">
  <h1>Something awesome is coming soon.</h1>
</body>
</html>
