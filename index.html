<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    body {
      margin: 0;
      font-family: Consolas, monospace;
      text-align: center;
      background: #000000; /* matches image background */
      color: white;
    }

    /* Desktop image */
    img {
      max-width: 95%;
      width: 650px;
      height: auto;
      margin-top: 50px;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      color: white;
    }

    /* Mobile styles */
    @media (max-width: 900px) {
      img {
        width: 95%;        /* almost full width for mobile */
        height: auto;
        margin: 30px auto 0;
      }

      h1 {
        font-size: 65px;
      }
    }

  </style>
</head>
<body>
  <img src="APH_Logo_Dark.png" alt="Coming Soon">
  <h1>
    Something awesome is <span class="highlight-underline">coming soon</span>.
  </h1>
</body>
</html>
